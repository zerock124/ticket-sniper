<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tixcraft 搶票助手</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="container">
        <!-- 標題 -->
        <div class="header">
            <span class="logo">🎫</span>
            <h1>Tixcraft 搶票助手</h1>
        </div>

        <!-- Tab 導覽列 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="tab-basic">基礎設定</button>
            <button class="tab-btn" data-tab="tab-logic">執行邏輯</button>
            <button class="tab-btn" data-tab="tab-run">執行狀態</button>
        </div>

        <!-- Tab 1：基礎設定 -->
        <div id="tab-basic" class="tab-panel active">

            <!-- 設定區塊：目標網址 -->
            <div class="section">
                <label class="label" for="targetUrl">目標網址</label>
                <input type="text" id="targetUrl" class="input"
                    placeholder="例如：https://tixcraft.com/activity/game/..." />
                <div class="hint">無法辨識頁面類型時，自動跳轉至此網址</div>
            </div>

            <!-- 設定區塊：購買數量 -->
            <div class="section">
                <label class="label" for="buyCount">購買數量</label>
                <input type="number" id="buyCount" class="input" min="1" max="10" value="2"
                    placeholder="輸入購買數量" />
            </div>

            <!-- 設定區塊：場次關鍵字 -->
            <div class="section">
                <label class="label" for="chooseDate">場次關鍵字</label>
                <input type="text" id="chooseDate" class="input"
                    placeholder="例如：2026/03/15" />
                <div class="hint">輸入場次關鍵字，系統自動選取符合的場次</div>
            </div>

            <!-- 設定區塊：區域關鍵字 -->
            <div class="section">
                <label class="label" for="chooseArea">區域關鍵字</label>
                <input type="text" id="chooseArea" class="input"
                    placeholder="例如：A區, 搖滾區" />
                <div class="hint">多個關鍵字以半形逗號分隔，依序優先選取</div>
            </div>


            <!-- 設定區塊：問題驗證答案 -->
            <div class="section">
                <label class="label" for="verifyCode">問題驗證答案</label>
                <input type="text" id="verifyCode" class="input"
                    placeholder="填入 /ticket/verify/ 頁面問題的答案" />
                <div class="hint">用於答題驗證頁（部分活動需要），可留空</div>
            </div>
            <!-- OCR API 網址設定 -->
            <div class="section">
                <label class="label" for="ocrApiUrlSelect">
                    OCR API 網址
                    <span class="hint">（本機驗證碼辨識服務）</span>
                </label>
                <select id="ocrApiUrlSelect" class="input">
                    <option value="http://1.34.200.57:5511/ocr">遠端伺服器（1.34.200.57）</option>
                    <option value="http://localhost:5511/ocr" selected>本機（localhost）</option>
                    <option value="__custom__">自行輸入</option>
                </select>
                <input type="text" id="ocrApiUrlCustom" class="input"
                    placeholder="http://localhost:5511/ocr"
                    style="display:none; margin-top:4px;" />
                <div class="hint">啟動方式：<code>python ocr_server.py</code></div>
            </div>

            <button id="saveBtn" class="btn btn-save">💾 儲存設定</button>
        </div><!-- /tab-basic -->

        <!-- Tab 2：執行邏輯 -->
        <div id="tab-logic" class="tab-panel">

            <!-- 找不到符合場次時 -->
            <div class="section">
                <label class="label">找不到符合場次時</label>
                <select id="dateFallback" class="input">
                    <option value="refresh">重新整理頁面</option>
                    <option value="select_first">選取第一個可購場次</option>
                </select>
            </div>

            <!-- 找不到符合區域時 -->
            <div class="section">
                <label class="label">找不到符合區域時</label>
                <select id="areaFallback" class="input">
                    <option value="refresh">重新整理頁面</option>
                    <option value="select_first">選取第一個可購區域</option>
                </select>
            </div>

            <!-- 重整延遲 -->
            <div class="section">
                <label class="label" for="reloadDelay">重整延遲（秒）</label>
                <input type="number" id="reloadDelay" class="input" min="0.1" max="60" step="0.1" value="1"
                    placeholder="例如：1" />
                <div class="hint">0.1 代表 0.1 秒；1 代表 1 秒</div>
            </div>

            <button id="saveBtnLogic" class="btn btn-save">💾 儲存設定</button>
        </div><!-- /tab-logic -->

        <!-- Tab 3：執行狀態 -->
        <div id="tab-run" class="tab-panel tab-run-layout">

            <!-- 狀態列 -->
            <div class="status-bar" id="statusBar">
                <span class="status-dot idle" id="statusDot"></span>
                <span id="statusText">待命中</span>
            </div>

            <!-- OCR Server 狀態 -->
            <div class="ocr-status-row">
                <span class="ocr-dot" id="ocrDot"></span>
                <span class="ocr-label" id="ocrLabel">OCR Server：檢查中...</span>
                <button id="checkOcrBtn" class="btn btn-ocr-check">🔄</button>
            </div>

            <!-- 控制按鈕 -->
            <div class="button-group">
                <button id="startBtn" class="btn btn-start">▶ 開始搶票</button>
                <button id="stopBtn" class="btn btn-stop" disabled>⏹ 停止</button>
            </div>

            <!-- 執行紀錄 -->
            <div class="log-header">
                <label class="label">執行紀錄</label>
                <button id="clearLogBtn" class="btn btn-clear-log" title="清除所有日誌">🗑 清除</button>
            </div>
            <div id="logArea" class="log-area"></div>
        </div><!-- /tab-run -->

        <div class="footer">
            <span>🌐 tixcraft.com &middot; 🖥️ OCR Server</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
