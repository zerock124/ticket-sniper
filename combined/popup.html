<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>搶票助手 Pro</title>
    <link rel="stylesheet" href="popup.css" />
</head>

<body>
    <div class="container">

        <!-- 標題列 -->
        <div class="header">
            <span class="logo">🎫</span>
            <h1>搶票助手 Pro</h1>
            <span class="header-sub">KKTIX &amp; Tixcraft</span>
        </div>

        <!-- 平台切換列 -->
        <div class="platform-nav">
            <button class="platform-btn active" data-platform="kktix">
                🔴 KKTIX
            </button>
            <button class="platform-btn" data-platform="tixcraft">
                🟢 Tixcraft
            </button>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!--  KKTIX 面板                                 -->
        <!-- ═══════════════════════════════════════════ -->
        <div id="panel-kktix" class="platform-panel active">

            <!-- 子 Tab 導覽列 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="kktix-tab-basic">基礎設定</button>
                <button class="tab-btn" data-tab="kktix-tab-logic">執行邏輯</button>
                <button class="tab-btn" data-tab="kktix-tab-run">執行狀態</button>
            </div>

            <!-- Tab 1：基礎設定 -->
            <div id="kktix-tab-basic" class="tab-panel active">

                <!-- 購買數量 -->
                <div class="section">
                    <label class="label" for="kktix-buyCount">購買數量</label>
                    <input type="number" id="kktix-buyCount" class="input" min="1" max="10" value="2"
                        placeholder="輸入購買數量" />
                </div>

                <!-- 票種選擇 -->
                <div class="section">
                    <div class="area-header">
                        <label class="label">選擇票種</label>
                        <button id="kktix-fetchTicketsBtn" class="btn btn-fetch">🔄 抓取票種</button>
                    </div>
                    <div class="hint" style="margin-bottom:6px">勾選後優先順序由上至下；未抓取時請使用手動輸入</div>

                    <!-- 票種 Checkbox 清單 -->
                    <div id="kktix-ticketList" class="ticket-checklist">
                        <div class="ticket-placeholder">請點擊「🔄 抓取票種」從頁面載入可選票種</div>
                    </div>

                    <!-- 備用：手動輸入 -->
                    <details id="kktix-manualAreaWrap" class="manual-area" style="display:none;">
                        <summary>✏️ 手動輸入（備用）</summary>
                        <textarea id="kktix-chooseArea" class="textarea" rows="2"
                            placeholder="例如：2,880, 4,480"></textarea>
                    </details>
                </div>

                <!-- 會員代碼 -->
                <div class="section">
                    <label class="label" for="kktix-memberCode">會員代碼</label>
                    <input type="text" id="kktix-memberCode" class="input"
                        placeholder="（選填）輸入會員代碼" />
                </div>

                <!-- 問題答案 -->
                <div class="section">
                    <label class="label" for="kktix-question">
                        問題答案
                        <span class="hint">（有 Google reCaptcha 則不需填寫）</span>
                    </label>
                    <input type="text" id="kktix-question" class="input"
                        placeholder="（選填）輸入問題答案" />
                </div>

                <button id="kktix-saveBtn" class="btn btn-save">💾 儲存設定</button>
            </div><!-- /kktix-tab-basic -->

            <!-- Tab 2：執行邏輯 -->
            <div id="kktix-tab-logic" class="tab-panel">

                <div class="section">
                    <label class="label">找不到符合票種時</label>
                    <select id="kktix-ticketFallback" class="input">
                        <option value="refresh">重新整理頁面</option>
                        <option value="select_first">選取第一個可購票種</option>
                    </select>
                </div>

                <div class="section">
                    <label class="label" for="kktix-reloadDelay">重整延遲（秒）</label>
                    <input type="number" id="kktix-reloadDelay" class="input"
                        min="0.1" max="60" step="0.1" value="1" placeholder="例如：1" />
                    <div class="hint">0.1 代表 0.1 秒；1 代表 1 秒</div>
                </div>

                <button id="kktix-saveBtnLogic" class="btn btn-save">💾 儲存設定</button>
            </div><!-- /kktix-tab-logic -->

            <!-- Tab 3：執行狀態 -->
            <div id="kktix-tab-run" class="tab-panel tab-run-layout">

                <!-- 主狀態列 -->
                <div class="status-bar" id="kktix-statusBar">
                    <span class="status-dot idle" id="kktix-statusDot"></span>
                    <span id="kktix-statusText">待機中</span>
                </div>

                <!-- 控制按鈕 -->
                <div class="button-group">
                    <button id="kktix-startBtn" class="btn btn-start">▶ 開始搶票</button>
                    <button id="kktix-stopBtn" class="btn btn-stop" disabled>⏹ 停止</button>
                </div>

                <!-- 執行紀錄 -->
                <div class="log-header">
                    <label class="label">執行紀錄</label>
                    <button id="kktix-clearLogBtn" class="btn btn-clear-log" title="清除日誌">🗑 清除</button>
                </div>
                <div id="kktix-logArea" class="log-area"></div>
            </div><!-- /kktix-tab-run -->

        </div><!-- /panel-kktix -->

        <!-- ═══════════════════════════════════════════ -->
        <!--  Tixcraft 面板                              -->
        <!-- ═══════════════════════════════════════════ -->
        <div id="panel-tixcraft" class="platform-panel">

            <!-- 子 Tab 導覽列 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="tixcraft-tab-basic">基礎設定</button>
                <button class="tab-btn" data-tab="tixcraft-tab-logic">執行邏輯</button>
                <button class="tab-btn" data-tab="tixcraft-tab-run">執行狀態</button>
            </div>

            <!-- Tab 1：基礎設定 -->
            <div id="tixcraft-tab-basic" class="tab-panel active">

                <div class="section">
                    <label class="label" for="tixcraft-targetUrl">目標網址</label>
                    <input type="text" id="tixcraft-targetUrl" class="input"
                        placeholder="例如：https://tixcraft.com/activity/game/..." />
                    <div class="hint">無法辨識頁面類型時，自動跳轉至此網址</div>
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-buyCount">購買數量</label>
                    <input type="number" id="tixcraft-buyCount" class="input" min="1" max="10" value="2"
                        placeholder="輸入購買數量" />
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-chooseDate">場次關鍵字</label>
                    <input type="text" id="tixcraft-chooseDate" class="input"
                        placeholder="例如：2026/03/15" />
                    <div class="hint">輸入場次關鍵字，系統自動選取符合的場次</div>
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-chooseArea">區域關鍵字</label>
                    <input type="text" id="tixcraft-chooseArea" class="input"
                        placeholder="例如：A區, 搖滾區" />
                    <div class="hint">多個關鍵字以半形逗號分隔，依序優先選取</div>
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-verifyCode">問題驗證答案</label>
                    <input type="text" id="tixcraft-verifyCode" class="input"
                        placeholder="填入 /ticket/verify/ 頁面問題的答案" />
                    <div class="hint">用於答題驗證頁（部分活動需要），可留空</div>
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-ocrApiUrlSelect">
                        OCR API 網址
                        <span class="hint">（本機驗證碼辨識服務）</span>
                    </label>
                    <select id="tixcraft-ocrApiUrlSelect" class="input">
                        <option value="http://1.34.200.57:5511/ocr">遠端伺服器（1.34.200.57）</option>
                        <option value="http://localhost:5511/ocr" selected>本機（localhost）</option>
                        <option value="__custom__">自行輸入</option>
                    </select>
                    <input type="text" id="tixcraft-ocrApiUrlCustom" class="input"
                        placeholder="http://localhost:5511/ocr"
                        style="display:none; margin-top:4px;" />
                    <div class="hint">啟動方式：<code>python ocr_server.py</code></div>
                </div>

                <button id="tixcraft-saveBtn" class="btn btn-save">💾 儲存設定</button>
            </div><!-- /tixcraft-tab-basic -->

            <!-- Tab 2：執行邏輯 -->
            <div id="tixcraft-tab-logic" class="tab-panel">

                <div class="section">
                    <label class="label">找不到符合場次時</label>
                    <select id="tixcraft-dateFallback" class="input">
                        <option value="refresh">重新整理頁面</option>
                        <option value="select_first">選取第一個可購場次</option>
                    </select>
                </div>

                <div class="section">
                    <label class="label">找不到符合區域時</label>
                    <select id="tixcraft-areaFallback" class="input">
                        <option value="refresh">重新整理頁面</option>
                        <option value="select_first">選取第一個可購區域</option>
                    </select>
                </div>

                <div class="section">
                    <label class="label" for="tixcraft-reloadDelay">重整延遲（秒）</label>
                    <input type="number" id="tixcraft-reloadDelay" class="input"
                        min="0.1" max="60" step="0.1" value="1" placeholder="例如：1" />
                    <div class="hint">0.1 代表 0.1 秒；1 代表 1 秒</div>
                </div>

                <button id="tixcraft-saveBtnLogic" class="btn btn-save">💾 儲存設定</button>
            </div><!-- /tixcraft-tab-logic -->

            <!-- Tab 3：執行狀態 -->
            <div id="tixcraft-tab-run" class="tab-panel tab-run-layout">

                <!-- 主狀態列 -->
                <div class="status-bar" id="tixcraft-statusBar">
                    <span class="status-dot idle" id="tixcraft-statusDot"></span>
                    <span id="tixcraft-statusText">待命中</span>
                </div>

                <!-- OCR Server 狀態 -->
                <div class="ocr-status-row">
                    <span class="ocr-dot" id="tixcraft-ocrDot"></span>
                    <span class="ocr-label" id="tixcraft-ocrLabel">OCR Server：檢查中...</span>
                    <button id="tixcraft-checkOcrBtn" class="btn btn-ocr-check">🔄</button>
                </div>

                <!-- 控制按鈕 -->
                <div class="button-group">
                    <button id="tixcraft-startBtn" class="btn btn-start">▶ 開始搶票</button>
                    <button id="tixcraft-stopBtn" class="btn btn-stop" disabled>⏹ 停止</button>
                </div>

                <!-- 執行紀錄 -->
                <div class="log-header">
                    <label class="label">執行紀錄</label>
                    <button id="tixcraft-clearLogBtn" class="btn btn-clear-log" title="清除日誌">🗑 清除</button>
                </div>
                <div id="tixcraft-logArea" class="log-area"></div>
            </div><!-- /tixcraft-tab-run -->

        </div><!-- /panel-tixcraft -->

        <!-- 頁尾 -->
        <div class="footer">
            <span>🔴 kktix.com &nbsp;|&nbsp; 🟢 tixcraft.com</span>
        </div>

    </div><!-- /container -->

    <script src="popup.js"></script>
</body>

</html>
